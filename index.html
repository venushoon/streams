<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에듀 스트림스 (Edu Streams) - 최종 완성본</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap');
        :root { --bg-color: #e0e5ec; --shadow-light: #ffffff; --shadow-dark: #a3b1c6; }
        body {
            font-family: 'Nanum Round', sans-serif;
            background-color: var(--bg-color);
            margin: 0; overflow: hidden; touch-action: manipulation; user-select: none;
        }
        .neu-card { background: var(--bg-color); border-radius: 20px; box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light); }
        .neu-btn { background: var(--bg-color); border-radius: 12px; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); transition: all 0.2s ease; cursor: pointer; }
        .neu-btn:active { box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); transform: scale(0.98); }
        .neu-inset { box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 타일 크기 자동 최적화 */
        .stream-slot {
            aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: min(1.5vw, 1.2rem);
        }
        .joker-tile { background: linear-gradient(135deg, #ffed4a 0%, #ff9800 100%); color: white !important; border: none; }
        .floating-controls { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const SCORE_TABLE = {
            1: 0, 2: 1, 3: 3, 4: 5, 5: 7, 6: 9, 7: 11, 8: 15, 9: 20, 10: 25,
            11: 30, 12: 35, 13: 40, 14: 50, 15: 60, 16: 70, 17: 80, 18: 90, 19: 100, 20: 300
        };

        const App = () => {
            const [gameState, setGameState] = useState('HOME');
            const [playerCount, setPlayerCount] = useState(1);
            const [maxTurns, setMaxTurns] = useState(20);
            const [currentTurn, setCurrentTurn] = useState(0);
            const [currentNumber, setCurrentNumber] = useState(null);
            const [boards, setBoards] = useState([]);
            const [countdown, setCountdown] = useState(3);
            const [results, setResults] = useState([]);
            const [deck, setDeck] = useState([]);
            const [showHowTo, setShowHowTo] = useState(false);

            // 사운드 시스템
            const playSound = (type) => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'next') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'win') {
                    [440, 554, 659].forEach((f, i) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = 'square'; o.frequency.value = f;
                        o.connect(g); g.connect(ctx.destination);
                        g.gain.setValueAtTime(0.1, ctx.currentTime + i*0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i*0.1 + 0.5);
                        o.start(ctx.currentTime + i*0.1); o.stop(ctx.currentTime + i*0.1 + 0.5);
                    });
                }
            };

            const initGame = (p, t) => {
                setBoards(Array(p).fill(null).map(() => Array(t).fill(null)));
                const newDeck = [];
                for (let i = 1; i <= 10; i++) newDeck.push(i);
                for (let i = 11; i <= 19; i++) { newDeck.push(i); newDeck.push(i); }
                for (let i = 20; i <= 30; i++) newDeck.push(i);
                newDeck.push("★");
                setDeck(newDeck.sort(() => Math.random() - 0.5));
                setPlayerCount(p); setMaxTurns(t); setCurrentTurn(0); setGameState('READY'); setCountdown(3);
            };

            useEffect(() => {
                if (gameState === 'READY' && countdown > 0) {
                    const t = setTimeout(() => setCountdown(countdown - 1), 1000);
                    return () => clearTimeout(t);
                } else if (gameState === 'READY' && countdown === 0) {
                    setGameState('PLAYING'); setCurrentTurn(1);
                }
            }, [gameState, countdown]);

            useEffect(() => {
                if (gameState === 'PLAYING' && currentTurn > 0) {
                    if (currentTurn > maxTurns) {
                        finishGame();
                    } else {
                        const d = [...deck]; const n = d.pop();
                        setDeck(d); setCurrentNumber(n); playSound('next');
                    }
                }
            }, [currentTurn]);

            const placeNumber = (pIdx, sIdx) => {
                if (boards[pIdx][sIdx] !== null) return;
                playSound('click');
                const newBoards = [...boards];
                newBoards[pIdx] = [...newBoards[pIdx]];
                newBoards[pIdx][sIdx] = currentNumber;
                setBoards(newBoards);

                if (newBoards.every(b => b.filter(v => v !== null).length === currentTurn)) {
                    setTimeout(() => setCurrentTurn(prev => prev + 1), 300);
                }
            };

            const calculateDetails = (board) => {
                let streams = []; let current = [board[0]];
                for (let i = 0; i < board.length - 1; i++) {
                    const c = board[i], n = board[i+1];
                    if (c === "★" || n === "★" || c <= n) { current.push(n); } 
                    else { streams.push(current); current = [n]; }
                }
                streams.push(current);
                const total = streams.reduce((acc, s) => acc + (SCORE_TABLE[s.length] || 0), 0);
                return { total, streams };
            };

            const finishGame = () => {
                const res = boards.map(b => calculateDetails(b));
                setResults(res); setGameState('RESULT'); playSound('win');
            };

            if (gameState === 'HOME') return (
                <div className="h-screen flex items-center justify-center p-6">
                    {showHowTo && (
                        <div className="fixed inset-0 bg-black/50 z-[300] flex items-center justify-center p-4">
                            <div className="neu-card p-8 max-w-xl w-full bg-[#e0e5ec] animate__animated animate__zoomIn">
                                <h3 className="text-2xl font-bold mb-4 text-blue-600">📖 게임 방법</h3>
                                <div className="space-y-3 text-sm text-gray-700 leading-relaxed">
                                    <p>1. 무작위로 나오는 숫자를 내 보드판 빈칸에 배치합니다.</p>
                                    <p>2. 숫자가 <b>점점 커지는 순서(오름차순)</b>로 연결되면 점수가 높습니다.</p>
                                    <p>3. <b>조커(★)</b>는 어떤 숫자로도 변신해 흐름을 이어줍니다.</p>
                                    <p>4. 숫자가 작아지면 흐름이 끊기고 새로운 '마디'가 생깁니다.</p>
                                    <p>5. 마디별 길이에 따른 점수를 모두 합쳐 높은 사람이 승리!</p>
                                </div>
                                <button onClick={() => setShowHowTo(false)} className="w-full mt-6 py-3 bg-blue-500 text-white rounded-xl font-bold">이해했어요!</button>
                            </div>
                        </div>
                    )}
                    <div className="neu-card p-12 text-center max-w-lg w-full">
                        <h1 className="text-5xl font-black mb-8 text-blue-600">STREAMS</h1>
                        <div className="space-y-6 mb-10">
                            <div>
                                <p className="font-bold mb-3 text-gray-500">인원 선택</p>
                                <div className="flex justify-center gap-3">
                                    {[1, 2, 3, 4].map(n => (
                                        <button key={n} onClick={() => setPlayerCount(n)} className={`w-14 h-14 neu-btn font-bold ${playerCount === n ? 'neu-inset text-blue-600' : ''}`}>{n}명</button>
                                    ))}
                                </div>
                            </div>
                            <button onClick={() => setShowHowTo(true)} className="text-blue-500 font-bold underline">게임 방법 보기</button>
                        </div>
                        <button onClick={() => initGame(playerCount, 20)} className="w-full py-5 bg-blue-500 text-white rounded-2xl text-2xl font-black shadow-lg">게임 시작</button>
                    </div>
                </div>
            );

            if (gameState === 'READY') return <div className="h-screen flex items-center justify-center"><h1 className="text-9xl font-black text-blue-500 animate__animated animate__heartBeat animate__infinite">{countdown}</h1></div>;

            return (
                <div className="h-screen w-full flex flex-col p-4 overflow-hidden">
                    <div className="h-[15%] flex items-center justify-center">
                        <div className="neu-card px-8 py-3 flex items-center gap-6 animate__animated animate__fadeInDown">
                            <div className="text-center"><p className="text-xs text-gray-400 font-bold">TURN</p><p className="text-xl font-black">{currentTurn}/20</p></div>
                            <div className={`w-16 h-16 neu-inset rounded-full flex items-center justify-center ${currentNumber === '★' ? 'joker-tile' : 'bg-blue-500'} text-white text-3xl font-black shadow-inner`}>{currentNumber}</div>
                            <p className="font-bold text-blue-600">칸을 터치하세요!</p>
                        </div>
                    </div>

                    <div className={`h-[80%] grid gap-4 ${playerCount === 2 ? 'grid-cols-2' : playerCount > 2 ? 'grid-cols-2 grid-rows-2' : 'grid-cols-1'}`}>
                        {boards.map((board, pIdx) => (
                            <div key={pIdx} className="neu-card p-3 flex flex-col relative min-h-0">
                                <p className="text-xs font-bold text-blue-500 mb-1">PLAYER {pIdx + 1}</p>
                                <div className="grid grid-cols-5 gap-1.5 flex-grow content-start">
                                    {board.map((cell, sIdx) => (
                                        <div key={sIdx} onClick={() => placeNumber(pIdx, sIdx)} className={`neu-btn stream-slot ${cell ? (cell === '★' ? 'joker-tile neu-inset' : 'neu-inset text-blue-600') : 'hover:bg-blue-50'}`}>
                                            {cell}
                                        </div>
                                    ))}
                                </div>
                                {gameState === 'PLAYING' && board.filter(v => v !== null).length === currentTurn && (
                                    <div className="absolute inset-0 bg-white/40 flex items-center justify-center backdrop-blur-[1px] rounded-2xl">
                                        <span className="bg-green-500 text-white px-3 py-1 rounded-full text-xs font-bold">OK</span>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {gameState === 'RESULT' && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[500] flex items-center justify-center p-4">
                            <div className="neu-card max-w-4xl w-full p-8 bg-white max-h-[90vh] flex flex-col animate__animated animate__zoomInUp">
                                <h2 className="text-3xl font-black text-center mb-6 text-blue-600">최종 점수 결과</h2>
                                <div className="flex-grow overflow-y-auto no-scrollbar space-y-4 mb-6">
                                    {results.map((res, idx) => (
                                        <div key={idx} className="neu-inset p-5 rounded-2xl bg-gray-50">
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-xl font-bold">Player {idx + 1}</span>
                                                <span className="text-3xl font-black text-blue-600">{res.total}점</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {res.streams.map((s, si) => (
                                                    <div key={si} className="bg-white border-2 border-blue-200 px-3 py-1 rounded-lg text-sm">
                                                        <span className="text-blue-500 font-bold">{s.length}개</span> 연결 
                                                        <span className="ml-1 text-gray-400">({SCORE_TABLE[s.length]}점)</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => initGame(playerCount, 20)} className="py-4 neu-btn font-bold text-gray-600">다시 시작</button>
                                    <button onClick={() => setGameState('HOME')} className="py-4 bg-blue-500 text-white rounded-xl font-bold text-xl">홈으로</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="floating-controls"><button onClick={() => setGameState('HOME')} className="w-12 h-12 neu-btn flex items-center justify-center">🏠</button></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
