<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에듀 스트림스 (Edu Streams) - 숫자 오름차순 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap');
        
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body {
            font-family: 'Nanum Round', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* 뉴모피즘 스타일 */
        .neu-card {
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
        }

        .neu-btn {
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .neu-btn:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            transform: scale(0.98);
        }

        .neu-inset {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        /* 격자 레이아웃 최적화 */
        .game-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* 숫자 타일 스타일 */
        .stream-slot {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .stream-slot.filled {
            color: #3b82f6;
            background: #f0f4f8;
        }

        /* 하단 버튼 고정 */
        .floating-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 스트림스 점수표 데이터
        const SCORE_TABLE = {
            1: 0, 2: 1, 3: 3, 4: 5, 5: 7, 6: 9, 7: 11, 8: 15, 9: 20, 10: 25,
            11: 30, 12: 35, 13: 40, 14: 50, 15: 60, 16: 70, 17: 80, 18: 90, 19: 100, 20: 300
        };

        const App = () => {
            const [gameState, setGameState] = useState('HOME'); // HOME, READY, PLAYING, RESULT
            const [playerCount, setPlayerCount] = useState(1);
            const [maxTurns, setMaxTurns] = useState(20);
            const [currentTurn, setCurrentTurn] = useState(0);
            const [drawnNumbers, setDrawnNumbers] = useState([]);
            const [currentNumber, setCurrentNumber] = useState(null);
            const [boards, setBoards] = useState([]);
            const [countdown, setCountdown] = useState(3);
            const [winner, setWinner] = useState(null);

            // 숫자 주머니 생성 (1~10: 1개씩, 11~19: 2개씩, 20~30: 1개씩, 조커: 1개)
            const createDeck = () => {
                let deck = [];
                for (let i = 1; i <= 10; i++) deck.push(i);
                for (let i = 11; i <= 19; i++) { deck.push(i); deck.push(i); }
                for (let i = 20; i <= 30; i++) deck.push(i);
                deck.push("★"); // 조커
                return deck.sort(() => Math.random() - 0.5);
            };

            const [deck, setDeck] = useState([]);

            // 초기화
            const initGame = (players, turns) => {
                setPlayerCount(players);
                setMaxTurns(turns);
                setBoards(Array(players).fill(null).map(() => Array(turns).fill(null)));
                setDeck(createDeck());
                setGameState('READY');
                setCountdown(3);
            };

            // 카운트다운 로직
            useEffect(() => {
                if (gameState === 'READY') {
                    if (countdown > 0) {
                        const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                        return () => clearTimeout(timer);
                    } else {
                        setGameState('PLAYING');
                        drawNumber();
                    }
                }
            }, [gameState, countdown]);

            // 숫자 뽑기
            const drawNumber = () => {
                if (currentTurn >= maxTurns) {
                    calculateFinalScore();
                    return;
                }
                const newDeck = [...deck];
                const num = newDeck.pop();
                setDeck(newDeck);
                setCurrentNumber(num);
                setDrawnNumbers(prev => [...prev, num]);
                setCurrentTurn(prev => prev + 1);
            };

            // 숫자 배치
            const placeNumber = (pIdx, sIdx) => {
                if (boards[pIdx][sIdx] !== null) return;
                
                const newBoards = [...boards];
                newBoards[pIdx][sIdx] = currentNumber;
                setBoards(newBoards);

                // 모든 플레이어가 현재 턴의 숫자를 배치했는지 확인
                const allPlaced = newBoards.every(board => 
                    board.filter(val => val !== null).length === currentTurn
                );

                if (allPlaced) {
                    if (currentTurn < maxTurns) {
                        drawNumber();
                    } else {
                        calculateFinalScore();
                    }
                }
            };

            // 점수 계산 로직
            const calculateScore = (board) => {
                let totalScore = 0;
                let currentStream = 1;
                
                for (let i = 0; i < board.length - 1; i++) {
                    const curr = board[i] === "★" ? -1 : board[i];
                    const next = board[i+1] === "★" ? 99 : board[i+1];

                    // 조커는 무조건 흐름을 이어가므로 논리적 처리 필요하나 
                    // 간단히 앞뒤 관계를 숫자로 치환하여 체크
                    if (board[i+1] === "★" || board[i] === "★" || board[i] <= board[i+1]) {
                        currentStream++;
                    } else {
                        totalScore += SCORE_TABLE[currentStream] || 0;
                        currentStream = 1;
                    }
                }
                totalScore += SCORE_TABLE[currentStream] || 0;
                return totalScore;
            };

            const calculateFinalScore = () => {
                const scores = boards.map(b => calculateScore(b));
                setWinner(scores);
                setGameState('RESULT');
            };

            // 홈으로
            const goHome = () => setGameState('HOME');

            // --- 컴포넌트: 홈 화면 ---
            if (gameState === 'HOME') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 animate__animated animate__fadeIn">
                        <div className="neu-card p-10 text-center max-w-2xl w-full">
                            <h1 className="text-5xl font-extrabold mb-4 text-blue-600">에듀 스트림스</h1>
                            <p className="text-gray-600 mb-8">숫자를 오름차순으로 배치하여 가장 긴 줄을 만드세요!</p>
                            
                            <div className="grid grid-cols-1 gap-6 mb-10">
                                <div className="space-y-3">
                                    <p className="font-bold text-lg">인원 선택</p>
                                    <div className="flex justify-center gap-4">
                                        {[1, 2, 3, 4].map(n => (
                                            <button key={n} onClick={() => setPlayerCount(n)}
                                                className={`w-16 h-16 neu-btn font-bold text-xl ${playerCount === n ? 'text-blue-500 neu-inset' : ''}`}>
                                                {n}명
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="space-y-3">
                                    <p className="font-bold text-lg">문제 수 (난이도)</p>
                                    <div className="flex justify-center gap-4">
                                        {[10, 20].map(n => (
                                            <button key={n} onClick={() => setMaxTurns(n)}
                                                className={`px-8 py-4 neu-btn font-bold ${maxTurns === n ? 'text-blue-500 neu-inset' : ''}`}>
                                                {n}칸
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => initGame(playerCount, maxTurns)}
                                className="w-full py-5 bg-blue-500 text-white rounded-2xl text-2xl font-black shadow-lg hover:bg-blue-600 transition-all">
                                게임 시작하기
                            </button>
                        </div>
                    </div>
                );
            }

            // --- 컴포넌트: 준비 화면 ---
            if (gameState === 'READY') {
                return (
                    <div className="h-screen flex items-center justify-center">
                        <h1 className="text-9xl font-black text-blue-500 animate__animated animate__zoomIn">
                            {countdown}
                        </h1>
                    </div>
                );
            }

            // --- 컴포넌트: 게임 플레이 ---
            return (
                <div className="h-screen w-full relative flex flex-col overflow-hidden">
                    {/* 상단 현재 숫자 대시보드 */}
                    <div className="h-1/5 flex items-center justify-center p-4">
                        <div className="neu-card px-10 py-4 flex items-center gap-8 animate__animated animate__bounceInDown">
                            <div className="text-center">
                                <p className="text-sm text-gray-500 font-bold">TURN</p>
                                <p className="text-2xl font-black">{currentTurn} / {maxTurns}</p>
                            </div>
                            <div className="w-24 h-24 neu-inset rounded-full flex items-center justify-center bg-gradient-to-br from-blue-400 to-blue-600 shadow-inner">
                                <span className="text-4xl text-white font-black">{currentNumber}</span>
                            </div>
                            <div className="text-left">
                                <p className="text-sm text-gray-500 font-bold">NEXT NUMBER</p>
                                <p className="text-lg font-bold text-blue-600">숫자를 칸에 배치하세요!</p>
                            </div>
                        </div>
                    </div>

                    {/* 플레이어 보드 영역 */}
                    <div className={`h-4/5 grid ${playerCount > 2 ? 'grid-cols-2' : 'grid-cols-1'} gap-4 p-4 pb-20`}>
                        {boards.map((board, pIdx) => (
                            <div key={pIdx} className="neu-card p-4 flex flex-col relative overflow-hidden">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="font-bold text-blue-500">Player {pIdx + 1}</span>
                                    <span className="text-xs text-gray-400">오름차순 연결 시 점수 UP!</span>
                                </div>
                                <div className="grid grid-cols-5 sm:grid-cols-10 gap-2 flex-grow">
                                    {board.map((cell, sIdx) => (
                                        <div 
                                            key={sIdx}
                                            onClick={() => placeNumber(pIdx, sIdx)}
                                            className={`neu-btn stream-slot animate__animated ${cell ? 'neu-inset text-blue-600 animate__pulse' : 'hover:bg-blue-50'}`}
                                        >
                                            {cell}
                                        </div>
                                    ))}
                                </div>
                                {board.filter(v => v !== null).length === currentTurn && (
                                    <div className="absolute inset-0 bg-white/40 flex items-center justify-center backdrop-blur-[1px]">
                                        <span className="bg-green-500 text-white px-4 py-1 rounded-full text-sm font-bold shadow-lg">대기 중...</span>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* 결과 레이어 */}
                    {gameState === 'RESULT' && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[200] flex items-center justify-center p-6">
                            <div className="neu-card max-w-xl w-full p-8 text-center animate__animated animate__jackInTheBox bg-white">
                                <h2 className="text-4xl font-black mb-6 text-blue-600">게임 종료!</h2>
                                <div className="space-y-4 mb-8">
                                    {winner.map((score, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-4 neu-inset rounded-xl">
                                            <span className="text-xl font-bold">플레이어 {idx + 1}</span>
                                            <span className="text-3xl font-black text-blue-600">{score}점</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={goHome} className="w-full py-4 bg-blue-500 text-white rounded-xl text-xl font-bold">
                                    다시 하기
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 플로팅 컨트롤 */}
                    <div className="floating-controls">
                        <button onClick={goHome} className="w-12 h-12 neu-btn flex items-center justify-center text-xl" title="홈으로">🏠</button>
                        <button onClick={() => window.location.reload()} className="w-12 h-12 neu-btn flex items-center justify-center text-xl" title="새로고침">🔄</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
