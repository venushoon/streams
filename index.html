<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에듀 스트림스 (Edu Streams) - 최종 완성본</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap');
        
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body {
            font-family: 'Nanum Round', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* 뉴모피즘 스타일 기본 */
        .neu-card {
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
        }

        .neu-btn {
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .neu-btn:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            transform: scale(0.98);
        }

        .neu-inset {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 숫자 타일 스타일 (처음 크기 유지 + 화면 짤림 방지 최적화) */
        .stream-slot {
            aspect-ratio: 1/1;
            max-height: 12vh; /* 타일이 과도하게 커지는 것만 방어하여 스크롤 없앰 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem; /* 시원한 폰트 크기 복구 */
            cursor: pointer;
        }

        /* 하단 플로팅 버튼 */
        .floating-controls {
            position: fixed;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        /* 조커 타일 스타일 */
        .joker-tile {
            background: linear-gradient(135deg, #ffed4a 0%, #ff9800 100%);
            color: white !important;
            border: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // 스트림스 점수표 데이터
        const SCORE_TABLE = {
            1: 0, 2: 1, 3: 3, 4: 5, 5: 7, 6: 9, 7: 11, 8: 15, 9: 20, 10: 25,
            11: 30, 12: 35, 13: 40, 14: 50, 15: 60, 16: 70, 17: 80, 18: 90, 19: 100, 20: 300
        };

        const App = () => {
            const [gameState, setGameState] = useState('HOME');
            const [playerCount, setPlayerCount] = useState(1);
            const [maxTurns, setMaxTurns] = useState(20);
            const [currentTurn, setCurrentTurn] = useState(0);
            const [drawnNumbers, setDrawnNumbers] = useState([]);
            const [currentNumber, setCurrentNumber] = useState(null);
            const [boards, setBoards] = useState([]);
            const [countdown, setCountdown] = useState(3);
            const [finalScores, setFinalScores] = useState([]); 
            const [deck, setDeck] = useState([]);
            const [showHowToPopup, setShowHowToPopup] = useState(false);

            // 🎵 브라우저 내장 효과음 
            const playSound = useCallback((type) => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    // 타일 배치 틱 소리
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'next') {
                    // 턴 변경 딩동 소리
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'win') {
                    // 게임 종료 팡파르
                    [440, 554, 659].forEach((freq, i) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = 'square';
                        o.frequency.value = freq;
                        o.connect(g);
                        g.connect(ctx.destination);
                        g.gain.setValueAtTime(0.1, ctx.currentTime + (i * 0.1));
                        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.1) + 0.5);
                        o.start(ctx.currentTime + (i * 0.1));
                        o.stop(ctx.currentTime + (i * 0.1) + 0.5);
                    });
                }
            }, []);

            const resetGameStates = useCallback(() => {
                setCurrentTurn(0);
                setDrawnNumbers([]);
                setCurrentNumber(null);
                setBoards([]);
                setCountdown(3);
                setFinalScores([]);
                setDeck([]);
            }, []);

            const createDeck = useCallback(() => {
                let newDeck = [];
                for (let i = 1; i <= 10; i++) newDeck.push(i);
                for (let i = 11; i <= 19; i++) { newDeck.push(i); newDeck.push(i); }
                for (let i = 20; i <= 30; i++) newDeck.push(i);
                newDeck.push("★");
                return newDeck.sort(() => Math.random() - 0.5);
            }, []);

            const initGame = (players, turns) => {
                resetGameStates();
                setPlayerCount(players);
                setMaxTurns(turns);
                setBoards(Array(players).fill(null).map(() => Array(turns).fill(null)));
                setDeck(createDeck());
                setGameState('READY');
            };

            useEffect(() => {
                if (gameState === 'READY') {
                    if (countdown > 0) {
                        const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                        return () => clearTimeout(timer);
                    } else {
                        setGameState('PLAYING');
                        setTimeout(() => setCurrentTurn(1), 50);
                    }
                }
            }, [gameState, countdown]);

            useEffect(() => {
                if (gameState === 'PLAYING' && currentTurn > 0 && currentTurn <= maxTurns) {
                    drawNumber();
                } else if (gameState === 'PLAYING' && currentTurn > maxTurns) {
                    calculateFinalScore();
                }
            }, [currentTurn, gameState, maxTurns]);

            const drawNumber = () => {
                setDeck(prevDeck => {
                    if (prevDeck.length === 0) return prevDeck;
                    const newDeck = [...prevDeck];
                    const num = newDeck.pop();
                    setCurrentNumber(num);
                    setDrawnNumbers(prev => [...prev, num]);
                    if (currentTurn > 1) playSound('next');
                    return newDeck;
                });
            };

            const placeNumber = (pIdx, sIdx) => {
                if (boards[pIdx][sIdx] !== null) return;
                
                playSound('click');

                setBoards(prevBoards => {
                    const newBoards = [...prevBoards];
                    newBoards[pIdx] = [...newBoards[pIdx]];
                    newBoards[pIdx][sIdx] = currentNumber;
                    
                    const allPlaced = newBoards.every(board => 
                        board.filter(val => val !== null).length === currentTurn
                    );

                    if (allPlaced) {
                        setTimeout(() => setCurrentTurn(prev => prev + 1), 300);
                    }
                    
                    return newBoards;
                });
            };

            // 💡 학습 피드백을 위한 상세 점수 계산
            const calculateDetails = (board) => {
                let streams = [];
                let currentStream = [];
                
                for (let i = 0; i < board.length; i++) {
                    const curr = board[i];
                    if (curr === null) continue;

                    if (currentStream.length === 0) {
                        currentStream.push(curr);
                        continue;
                    }

                    const lastVal = currentStream[currentStream.length - 1];
                    if (lastVal === "★" || curr === "★" || lastVal <= curr) {
                        currentStream.push(curr);
                    } else {
                        streams.push(currentStream);
                        currentStream = [curr];
                    }
                }
                if (currentStream.length > 0) {
                    streams.push(currentStream);
                }

                const totalScore = streams.reduce((acc, stream) => acc + (SCORE_TABLE[stream.length] || 0), 0);
                return { totalScore, streams };
            };

            const calculateFinalScore = () => {
                const results = boards.map(b => calculateDetails(b));
                setFinalScores(results);
                setGameState('RESULT');
                playSound('win');
            };

            const goHome = () => {
                resetGameStates();
                setGameState('HOME');
            };

            const HowToPopup = () => (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] flex items-center justify-center p-6 animate__animated animate__fadeIn">
                    <div className="neu-card max-w-2xl w-full p-8 relative animate__animated animate__zoomIn bg-[#e0e5ec]">
                        <button onClick={() => setShowHowToPopup(false)} className="absolute top-4 right-4 w-10 h-10 neu-btn flex items-center justify-center text-xl font-bold text-gray-500">×</button>
                        <h2 className="text-3xl font-extrabold mb-6 text-blue-600 flex items-center gap-2">📜 게임 방법 안내</h2>
                        <div className="space-y-4 text-gray-700 h-[60vh] overflow-y-auto pr-4 no-scrollbar">
                            <div className="neu-inset p-5 rounded-xl bg-white/50">
                                <p className="font-bold text-lg mb-2 text-gray-800">🎮 게임 개요</p>
                                <ul className="list-disc list-inside space-y-1 text-sm">
                                    <li>1명부터 최대 4명까지 동시 진행 가능.</li>
                                    <li>숫자 타일(1~30 및 조커 별)을 뽑아 보드에 배치.</li>
                                </ul>
                            </div>
                            <div className="neu-inset p-5 rounded-xl bg-white/50">
                                <p className="font-bold text-lg mb-2 text-gray-800">🧱 핵심 규칙</p>
                                <ol className="list-decimal list-inside space-y-2 text-sm">
                                    <li><span className="font-bold text-blue-600">숫자 배치:</span> 화면에 나타난 숫자를 내 보드의 빈칸 중 한 곳에 즉시 적습니다.</li>
                                    <li><span className="font-bold text-blue-600">오름차순 연결:</span> 숫자가 커지는 방향으로 길게 연결될수록 높은 점수를 받습니다.</li>
                                    <li><span className="font-bold text-blue-600">조커 활용:</span> '★'(별) 타일은 원하는 어떤 숫자로도 사용할 수 있어 유용합니다.</li>
                                </ol>
                            </div>
                            <div className="neu-inset p-5 rounded-xl bg-white/50">
                                <p className="font-bold text-lg mb-2 text-gray-800">🏆 점수 계산 및 승리</p>
                                <ul className="list-disc list-inside space-y-1 text-sm">
                                    <li>숫자가 작아지는 지점에서 흐름이 끊깁니다. 각 연결된 마디에 해당하는 점수를 합산합니다.</li>
                                    <li>20칸을 모두 오름차순으로 채우면 <span className="font-bold text-orange-500">최대 300점</span>!</li>
                                </ul>
                            </div>
                        </div>
                        <button onClick={() => setShowHowToPopup(false)} className="w-full mt-6 py-4 bg-blue-500 text-white rounded-xl text-xl font-bold shadow-lg hover:bg-blue-600">확인 완료!</button>
                    </div>
                </div>
            );

            if (gameState === 'HOME') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 animate__animated animate__fadeIn">
                        {showHowToPopup && <HowToPopup />}
                        <div className="neu-card p-10 text-center max-w-2xl w-full">
                            <h1 className="text-5xl font-extrabold mb-4 text-blue-600">에듀 스트림스</h1>
                            <p className="text-gray-600 mb-8">숫자를 오름차순으로 배치하여 가장 긴 줄을 만드세요!</p>
                            
                            <div className="grid grid-cols-1 gap-6 mb-10">
                                <div className="space-y-3">
                                    <p className="font-bold text-lg">인원 선택 (전자칠판용)</p>
                                    <div className="flex justify-center gap-4">
                                        {[1, 2, 3, 4].map(n => (
                                            <button key={n} onClick={() => setPlayerCount(n)}
                                                className={`w-16 h-16 neu-btn font-bold text-xl ${playerCount === n ? 'text-blue-500 neu-inset' : ''}`}>
                                                {n}명
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="space-y-3">
                                    <p className="font-bold text-lg">칸 수 (문제 수)</p>
                                    <div className="flex justify-center gap-4">
                                        {[10, 20].map(n => (
                                            <button key={n} onClick={() => setMaxTurns(n)}
                                                className={`px-8 py-4 neu-btn font-bold ${maxTurns === n ? 'text-blue-500 neu-inset' : ''}`}>
                                                {n}칸
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <button onClick={() => setShowHowToPopup(true)}
                                    className="w-1/3 py-5 neu-btn text-xl font-bold text-gray-600">
                                    📜 게임 방법
                                </button>
                                <button onClick={() => initGame(playerCount, maxTurns)}
                                    className="w-2/3 py-5 bg-blue-500 text-white rounded-2xl text-2xl font-black shadow-lg hover:bg-blue-600 transition-all">
                                    게임 시작하기
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'READY') {
                return (
                    <div className="h-screen flex items-center justify-center">
                        <h1 className="text-9xl font-black text-blue-500 animate__animated animate__zoomIn">
                            {countdown}
                        </h1>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full relative flex flex-col overflow-hidden">
                    {/* 상단 대시보드 크기 및 여백 최적화 (여백 축소로 스크롤 방지) */}
                    <div className="flex-none flex items-center justify-center pt-3 pb-2 px-4">
                        <div className="neu-card px-8 py-3 flex items-center gap-6 animate__animated animate__bounceInDown">
                            <div className="text-center">
                                <p className="text-xs text-gray-500 font-bold">TURN</p>
                                <p className="text-xl font-black">{currentTurn} / {maxTurns}</p>
                            </div>
                            <div className={`w-20 h-20 neu-inset rounded-full flex items-center justify-center ${currentNumber === '★' ? 'joker-tile' : 'bg-gradient-to-br from-blue-400 to-blue-600'} shadow-inner`}>
                                <span className="text-4xl text-white font-black">{currentNumber}</span>
                            </div>
                            <div className="text-left">
                                <p className="text-xs text-gray-500 font-bold">NEXT NUMBER</p>
                                <p className="text-base font-bold text-blue-600">숫자를 배치하세요!</p>
                            </div>
                        </div>
                    </div>

                    {/* 보드 영역 (여백 축소 및 Flex 비율 조정으로 2인 모드 최적화) */}
                    <div className="flex-grow overflow-y-auto no-scrollbar px-4 pb-16 flex flex-col justify-center">
                        <div className={`w-full max-w-7xl mx-auto grid grid-cols-1 gap-4`}>
                            {boards.map((board, pIdx) => (
                                <div key={pIdx} className="neu-card px-5 py-3 flex flex-col relative animate__animated animate__fadeInUp">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="font-extrabold text-blue-500 text-lg">Player {pIdx + 1}</span>
                                        <span className="text-xs font-bold text-gray-400">오름차순 연결 시 점수 UP!</span>
                                    </div>
                                    <div className="grid grid-cols-5 sm:grid-cols-10 gap-2">
                                        {board.map((cell, sIdx) => (
                                            <div 
                                                key={sIdx}
                                                onClick={() => placeNumber(pIdx, sIdx)}
                                                className={`neu-btn stream-slot animate__animated ${cell ? (cell === '★' ? 'joker-tile neu-inset animate__pulse' : 'neu-inset text-blue-600 animate__pulse') : 'hover:bg-blue-50'}`}
                                            >
                                                {cell}
                                            </div>
                                        ))}
                                    </div>
                                    {gameState === 'PLAYING' && board.filter(v => v !== null).length === currentTurn && (
                                        <div className="absolute inset-0 bg-white/60 flex items-center justify-center backdrop-blur-[1px] rounded-[20px] z-10">
                                            <span className="bg-green-500 text-white px-5 py-2 rounded-full text-lg font-bold shadow-lg animate__animated animate__flash animate__infinite">대기 중...</span>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 학습 피드백 기능 결과창 */}
                    {gameState === 'RESULT' && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[200] flex items-center justify-center p-6">
                            <div className="neu-card max-w-2xl w-full p-8 text-center animate__animated animate__jackInTheBox bg-white shadow-2xl flex flex-col max-h-[90vh]">
                                <h2 className="text-4xl font-black mb-6 text-blue-600">🏆 게임 종료 🏆</h2>
                                <p className="text-gray-500 font-bold mb-4">점수 계산 방식 (연결된 칸 수에 따른 점수)</p>
                                
                                <div className="space-y-4 mb-8 overflow-y-auto pr-2 no-scrollbar flex-grow text-left">
                                    {finalScores.map((res, idx) => (
                                        <div key={idx} className="p-5 neu-inset rounded-2xl bg-gray-50">
                                            <div className="flex justify-between items-center mb-4 border-b-2 border-gray-200 pb-2">
                                                <span className="text-2xl font-bold text-gray-800">플레이어 {idx + 1}</span>
                                                <span className="text-4xl font-black text-blue-600">{res.totalScore}점</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {res.streams.map((stream, sIdx) => (
                                                    <div key={sIdx} className="bg-white border-2 border-blue-100 px-3 py-2 rounded-xl text-sm shadow-sm flex items-center gap-2">
                                                        <span className="font-extrabold text-blue-500">{stream.length}개 연결</span>
                                                        <span className="text-gray-400 font-bold">→ {SCORE_TABLE[stream.length] || 0}점</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => initGame(playerCount, maxTurns)} className="py-5 neu-btn text-xl font-bold text-gray-600 hover:text-blue-500 transition-colors">
                                        다시 하기
                                    </button>
                                    <button onClick={goHome} className="py-5 bg-blue-500 text-white rounded-2xl text-xl font-bold shadow-lg hover:bg-blue-600 transition-colors">
                                        홈으로 이동
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="floating-controls">
                        <button onClick={goHome} className="w-12 h-12 neu-btn flex items-center justify-center text-xl" title="홈으로">🏠</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
